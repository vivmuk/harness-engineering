<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" style="background:#050507">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d5dfc" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ff6b35" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6d5dfc"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#050507"/>
  <rect width="1200" height="675" fill="url(#g1)"/>

  <!-- Center harness core -->
  <circle cx="600" cy="337" r="120" fill="none" stroke="url(#g2)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="600" cy="337" r="86" fill="#0f0f13" stroke="#6d5dfc" stroke-width="1.5"/>
  <text x="600" y="330" text-anchor="middle" fill="#f5f5f7" font-size="22" font-family="system-ui" font-weight="600">Harness</text>
  <text x="600" y="358" text-anchor="middle" fill="#9ca3af" font-size="14" font-family="system-ui">Engineering</text>

  <!-- Layer nodes -->
  <g filter="url(#glow)">
    <rect x="80" y="110" width="180" height="72" rx="12" fill="#0f0f13" stroke="#6d5dfc" stroke-width="1.5"/>
    <text x="170" y="145" text-anchor="middle" fill="#f5f5f7" font-size="15" font-family="system-ui" font-weight="500">Rules</text>
    <text x="170" y="168" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="system-ui">CLAUDE.md</text>

    <rect x="80" y="290" width="180" height="72" rx="12" fill="#0f0f13" stroke="#6d5dfc" stroke-width="1.5"/>
    <text x="170" y="325" text-anchor="middle" fill="#f5f5f7" font-size="15" font-family="system-ui" font-weight="500">Playbooks</text>
    <text x="170" y="348" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="system-ui">.claude/commands</text>

    <rect x="80" y="470" width="180" height="72" rx="12" fill="#0f0f13" stroke="#6d5dfc" stroke-width="1.5"/>
    <text x="170" y="505" text-anchor="middle" fill="#f5f5f7" font-size="15" font-family="system-ui" font-weight="500">Agents</text>
    <text x="170" y="528" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="system-ui">.claude/agents</text>

    <rect x="940" y="110" width="180" height="72" rx="12" fill="#0f0f13" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="1030" y="145" text-anchor="middle" fill="#f5f5f7" font-size="15" font-family="system-ui" font-weight="500">Skills</text>
    <text x="1030" y="168" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="system-ui">.claude/skills</text>

    <rect x="940" y="290" width="180" height="72" rx="12" fill="#0f0f13" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="1030" y="325" text-anchor="middle" fill="#f5f5f7" font-size="15" font-family="system-ui" font-weight="500">Execution</text>
    <text x="1030" y="348" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="system-ui">src/</text>

    <rect x="940" y="470" width="180" height="72" rx="12" fill="#0f0f13" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="1030" y="505" text-anchor="middle" fill="#f5f5f7" font-size="15" font-family="system-ui" font-weight="500">State</text>
    <text x="1030" y="528" text-anchor="middle" fill="#9ca3af" font-size="12" font-family="system-ui">project.json</text>
  </g>

  <!-- Flow arrows -->
  <g stroke="#6d5dfc" stroke-width="2" fill="none" opacity="0.6">
    <path d="M260 146 Q420 146 480 280"/>
    <path d="M260 326 Q420 326 480 320"/>
    <path d="M260 506 Q420 506 480 380"/>
    <path d="M940 146 Q780 146 720 280"/>
    <path d="M940 326 Q780 326 720 320"/>
    <path d="M940 506 Q780 506 720 380"/>
  </g>

  <!-- QA / Anti-patterns loop -->
  <rect x="430" y="540" width="340" height="80" rx="16" fill="#0f0f13" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="600" y="575" text-anchor="middle" fill="#f5f5f7" font-size="16" font-family="system-ui" font-weight="500">Confirm → Execute → Evaluate → Improve</text>
  <text x="600" y="600" text-anchor="middle" fill="#9ca3af" font-size="13" font-family="system-ui">QHX recursive self-improvement loop</text>

  <!-- Decorative particles -->
  <circle cx="350" cy="220" r="3" fill="#6d5dfc" opacity="0.8"/>
  <circle cx="850" cy="420" r="3" fill="#ff6b35" opacity="0.8"/>
  <circle cx="300" cy="580" r="2.5" fill="#3b82f6" opacity="0.7"/>
  <circle cx="900" cy="180" r="2.5" fill="#6d5dfc" opacity="0.7"/>
</svg>
